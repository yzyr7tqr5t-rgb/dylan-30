<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer dark ring -->
  <circle cx="100" cy="100" r="98" fill="#1a1200" stroke="#c8920a" stroke-width="1.5"/>

  <!-- Outer text ring background -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#c8920a" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#c8920a" stroke-width="0.8"/>

  <!-- Outer ring text: ZAKŁAD WODOCIĄGÓW I KANALIZACJI SP. Z O.O. -->
  <path id="outerTop" d="M 100,100 m -82,0 a 82,82 0 1,1 164,0" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="10.5" font-weight="700" fill="#d4a017" letter-spacing="1.8">
    <textPath href="#outerTop" startOffset="2%">ZAKŁAD WODOCIĄGÓW I KANALIZACJI SP. Z O.O.</textPath>
  </text>

  <!-- Inner gold disc -->
  <circle cx="100" cy="100" r="70" fill="#c8920a"/>

  <!-- Cross / quadrant lines -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#1a1200" stroke-width="2.5"/>
  <line x1="30"  y1="100" x2="170" y2="100" stroke="#1a1200" stroke-width="2.5"/>

  <!-- Inner circle (crosshair centre) -->
  <circle cx="100" cy="100" r="14" fill="#1a1200" stroke="#c8920a" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="6"  fill="#c8920a"/>

  <!-- Small circle top-right quadrant (pipe symbol) -->
  <circle cx="138" cy="62" r="10" fill="none" stroke="#1a1200" stroke-width="2.5"/>
  <circle cx="138" cy="62" r="5"  fill="#1a1200"/>

  <!-- ZWiK lettering -->
  <text x="100" y="108" font-family="Arial Black, sans-serif" font-size="26" font-weight="900"
        fill="#1a1200" text-anchor="middle" letter-spacing="1">ZWiK</text>

  <!-- Łódź top-left -->
  <text x="68" y="72" font-family="Arial, sans-serif" font-size="10" font-weight="700"
        fill="#1a1200" text-anchor="middle">Łódź</text>

  <!-- 1925 top-right -->
  <text x="134" y="46" font-family="Arial, sans-serif" font-size="8.5" font-weight="700"
        fill="#1a1200" text-anchor="middle">1925</text>

  <!-- 2005 bottom-left -->
  <text x="66" y="148" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#1a1200" text-anchor="middle">2005</text>

  <!-- 80 LAT bottom-right -->
  <text x="138" y="148" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#1a1200" text-anchor="middle">80 LAT</text>

  <!-- ŁÓDŹ bottom -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="700"
        fill="#1a1200" text-anchor="middle" letter-spacing="2">ŁÓDŹ</text>
</svg>
